name: Deploy Azure Function Code
description: >
  Builds and deploys a .NET Azure Function App with health check and automatic rollback.
  Caller must have already run actions/checkout@v4 before calling this action.

inputs:
  function-name:
    required: true
    description: |
      Name of the function resource.
      Exclude any environment specific resource prefix like `shd`/`shp`
  dotnet-version:
    required: true
    description: '`8.0` | `9.0` | `10.0`'
  csproj-path:
    required: true
    description: Relative path to .csproj to be built
  packages-token:
    required: true
    description: Token for authenticating to the GitHub Packages NuGet feed
  github-action-client-id:
    required: true
    description: Client ID of the GitHub Actions service principal used to authenticate to Azure
  subscription-id:
    required: true
    description: Azure Subscription ID
  tenant-id:
    required: true
    description: Azure Tenant ID
  resource-prefix:
    required: false
    description: Resource prefix (e.g. shd | shp). Derived from branch name if not set (main=shp, else shd)
  cache:
    required: false
    default: 'true'
    description: Whether to cache NuGet packages in setup-dotnet

runs:
  using: composite
  steps:
    - name: Add nuget.config
      shell: bash
      run: cp ServiceDeployment/nuget.config .

    - name: Setup .NET ${{ inputs.dotnet-version }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}.x
        cache: ${{ inputs.cache }}
        cache-dependency-path: '**/packages.lock.json'

    - name: Build project
      shell: bash
      run: dotnet build "${{ inputs.csproj-path }}" --configuration Release --output ./output
      env:
        NUGET_AUTH_TOKEN: ${{ inputs.packages-token }}

    - name: Get resource prefix
      id: get-resource-prefix
      shell: pwsh
      run: |
        $ResourcePrefix = "${{ inputs.resource-prefix }}"
        if (-not $ResourcePrefix) {
          $Branch = "${{ github.ref_name }}"
          $ResourcePrefix = if ($Branch -eq 'main') { "shp" } else { "shd" }
        }
        Write-Host "resourcePrefix=$ResourcePrefix"
        "resourcePrefix=$ResourcePrefix" >> $env:GITHUB_OUTPUT

    - name: Azure login
      uses: azure/login@v2
      with:
        client-id: ${{ inputs.github-action-client-id }}
        tenant-id: ${{ inputs.tenant-id }}
        subscription-id: ${{ inputs.subscription-id }}

    - name: Resolve app name and resource group
      id: resolve
      shell: bash
      run: |
        APP="${{ steps.get-resource-prefix.outputs.resourcePrefix }}-${{ inputs.function-name }}"
        RG=$(az functionapp list --query "[?name=='$APP'].resourceGroup" -o tsv)
        echo "appName=$APP" >> "$GITHUB_OUTPUT"
        echo "resourceGroup=$RG" >> "$GITHUB_OUTPUT"

    - name: Save current deployment
      id: save
      uses: StottHoare/azure-functions-action/save@main
      with:
        app-name: ${{ steps.resolve.outputs.appName }}
        resource-group: ${{ steps.resolve.outputs.resourceGroup }}

    - name: Deploy Azure Function Code
      uses: Azure/functions-action@v1
      with:
        app-name: ${{ steps.resolve.outputs.appName }}
        package: './output'

    - name: Health Check
      id: health-check
      uses: StottHoare/azure-functions-action/check-health@main
      with:
        app-name: ${{ steps.resolve.outputs.appName }}
        resource-group: ${{ steps.resolve.outputs.resourceGroup }}
        pre-deploy-instance-ids: ${{ steps.save.outputs.pre-deploy-instance-ids }}

    - name: Evaluate rollback
      id: eval-rollback
      if: steps.health-check.outputs.healthy != 'true'
      shell: bash
      run: |
        PRE_DEPLOY_STATES="${{ steps.save.outputs.pre-deploy-states }}"
        SHOULD_ROLLBACK="true"
        if [ -n "$PRE_DEPLOY_STATES" ]; then
          ALL_PRE_STOPPED=true
          for state in $(echo "$PRE_DEPLOY_STATES" | tr ',' '\n'); do
            if [ "$state" != "STOPPED" ]; then
              ALL_PRE_STOPPED=false
              break
            fi
          done
          if [ "$ALL_PRE_STOPPED" = "true" ]; then
            echo "Pre-deploy instances were all STOPPED — rollback would restore a broken state, skipping"
            SHOULD_ROLLBACK="false"
          fi
        fi
        echo "should-rollback=$SHOULD_ROLLBACK" >> "$GITHUB_OUTPUT"

    - name: Fetch function logs
      if: steps.health-check.outputs.healthy != 'true'
      shell: bash
      run: |
        APP="${{ steps.resolve.outputs.appName }}"
        RG="${{ steps.resolve.outputs.resourceGroup }}"
        echo "=== Fetching recent function logs ==="
        az webapp log download \
          --name "$APP" \
          --resource-group "$RG" \
          --log-file function_logs.zip 2>/dev/null || true

        if [ -f function_logs.zip ] && [ -s function_logs.zip ]; then
          unzip -o function_logs.zip -d function_logs 2>/dev/null || true
          LOG_FILES=$(find function_logs -name "*.log" | sort -r | head -5)
          if [ -n "$LOG_FILES" ]; then
            echo "$LOG_FILES" | while read -r f; do
              echo "--- $f ---"
              tail -100 "$f"
              echo ""
            done
          else
            echo "No log files found in download"
          fi
        else
          echo "Log download unavailable or empty"
        fi

    - name: Snapshot instance IDs before rollback
      id: pre-rollback-snapshot
      if: steps.health-check.outputs.healthy != 'true' && steps.eval-rollback.outputs.should-rollback == 'true'
      shell: bash
      run: |
        INSTANCE_IDS=$(az webapp list-instances \
          --name "${{ steps.resolve.outputs.appName }}" \
          --resource-group "${{ steps.resolve.outputs.resourceGroup }}" \
          --query "[].name" -o tsv 2>/dev/null || echo "")
        IDS_CSV=$(echo "$INSTANCE_IDS" | tr '\n' ',' | sed 's/,$//')
        echo "instance-ids=$IDS_CSV" >> "$GITHUB_OUTPUT"

    - name: Rollback
      id: rollback
      if: steps.health-check.outputs.healthy != 'true' && steps.eval-rollback.outputs.should-rollback == 'true'
      uses: StottHoare/azure-functions-action/rollback@main
      with:
        app-name: ${{ steps.resolve.outputs.appName }}

    - name: Health Check (post-rollback)
      id: health-check-post-rollback
      if: steps.health-check.outputs.healthy != 'true' && steps.eval-rollback.outputs.should-rollback == 'true'
      uses: StottHoare/azure-functions-action/check-health@main
      with:
        app-name: ${{ steps.resolve.outputs.appName }}
        resource-group: ${{ steps.resolve.outputs.resourceGroup }}
        pre-deploy-instance-ids: ${{ steps.pre-rollback-snapshot.outputs.instance-ids }}

    - name: Fail deployment
      if: steps.health-check.outputs.healthy != 'true'
      shell: bash
      run: |
        if [ "${{ steps.eval-rollback.outputs.should-rollback }}" != "true" ]; then
          echo "Deployment was unhealthy — rollback skipped as pre-deploy state was also broken"
        elif [ "${{ steps.health-check-post-rollback.outputs.healthy }}" = "true" ]; then
          echo "Deployment was unhealthy — rolled back to previous version successfully"
        else
          echo "Deployment was unhealthy and rollback also failed — manual intervention required"
        fi
        exit 1
