name: Check Azure Functions Health
description: Queries instance state via az webapp list-instances and reports whether the function is healthy relative to pre-deploy state.

inputs:
  app-name:
    description: Full Azure Function App name
    required: true
  resource-group:
    description: Azure resource group name
    required: true
  pre-deploy-states:
    description: Comma-separated instance states captured before deployment (from save action)
    required: false
    default: ''

outputs:
  healthy:
    description: true if the function app is healthy, false otherwise
    value: ${{ steps.health-check.outputs.healthy }}

runs:
  using: composite
  steps:
    - name: Check health via instance state
      id: health-check
      shell: bash
      run: |
        APP_NAME="${{ inputs.app-name }}"
        RG="${{ inputs.resource-group }}"
        PRE_DEPLOY_STATES="${{ inputs.pre-deploy-states }}"

        # If all instances were already STOPPED before deploy, skip health check
        if [ -n "$PRE_DEPLOY_STATES" ]; then
          ALL_PRE_STOPPED=true
          for state in $(echo "$PRE_DEPLOY_STATES" | tr ',' '\n'); do
            if [ "$state" != "STOPPED" ]; then
              ALL_PRE_STOPPED=false
              break
            fi
          done
          if [ "$ALL_PRE_STOPPED" = "true" ]; then
            echo "All instances were already STOPPED before deployment — skipping health check"
            echo "healthy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        fi

        echo "Waiting 10 seconds for function host restart..."
        sleep 10

        HEALTHY="false"
        MAX_ATTEMPTS=6
        RETRY_INTERVAL=30

        for attempt in $(seq 1 $MAX_ATTEMPTS); do
          echo "Health check attempt $attempt of $MAX_ATTEMPTS..."

          STATES=$(az webapp list-instances \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --query "[].state" -o tsv 2>/dev/null || echo "")

          echo "Instance states: '$STATES'"

          if [ -z "$STATES" ]; then
            echo "No instances found yet."
          else
            TRANSITIONAL=$(echo "$STATES" | grep -vE '^(READY|STOPPED)$' || true)

            if [ -n "$TRANSITIONAL" ]; then
              echo "Instances still transitioning: $TRANSITIONAL"
            elif echo "$STATES" | grep -q '^STOPPED$'; then
              echo "One or more instances are STOPPED — unhealthy"
              HEALTHY="false"
              break
            else
              echo "All instances are READY — healthy"
              HEALTHY="true"
              break
            fi
          fi

          if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
            echo "Retrying in ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          fi
        done

        echo "healthy=$HEALTHY" >> "$GITHUB_OUTPUT"
        echo "Health check result: healthy=$HEALTHY"
