name: Check Azure Functions Health
description: Queries instance state via az webapp list-instances and reports whether the function is healthy.

inputs:
  app-name:
    description: Full Azure Function App name
    required: true
  resource-group:
    description: Azure resource group name
    required: true
  pre-deploy-instance-ids:
    description: Comma-separated instance IDs captured before deployment (from save action)
    required: true

outputs:
  healthy:
    description: true if the function app is healthy, false otherwise
    value: ${{ steps.health-check.outputs.healthy }}

runs:
  using: composite
  steps:
    - name: Check health via instance state
      id: health-check
      shell: bash
      run: |
        APP_NAME="${{ inputs.app-name }}"
        RG="${{ inputs.resource-group }}"
        PRE_IDS="${{ inputs.pre-deploy-instance-ids }}"

        echo "Waiting 10 seconds for function host restart..."
        sleep 10

        HEALTHY="false"
        MAX_ATTEMPTS=10
        RETRY_INTERVAL=30
        ALL_POLLS_READY=true

        for attempt in $(seq 1 $MAX_ATTEMPTS); do
          echo "Health check attempt $attempt of $MAX_ATTEMPTS..."

          INSTANCE_DATA=$(az webapp list-instances \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --query "[].join('|', [name, state])" -o tsv 2>/dev/null || echo "")

          echo "Instances: '$INSTANCE_DATA'"

          if [ -z "$INSTANCE_DATA" ]; then
            echo "No instances found yet."
            ALL_POLLS_READY=false
          else
            NEW_SEEN=false
            ALL_NEW_READY=true

            while IFS= read -r entry; do
              [ -z "$entry" ] && continue
              id="${entry%|*}"
              state="${entry#*|}"

              IS_NEW=true
              for pre_id in $(echo "$PRE_IDS" | tr ',' '\n'); do
                if [ "$id" = "$pre_id" ]; then
                  IS_NEW=false
                  break
                fi
              done

              if [ "$IS_NEW" = "true" ]; then
                NEW_SEEN=true
                echo "New instance $id: $state"
                if [ "$state" != "READY" ]; then
                  ALL_NEW_READY=false
                fi
              else
                echo "Old instance $id: $state (ignored)"
              fi
            done <<< "$INSTANCE_DATA"

            if [ "$NEW_SEEN" = "false" ]; then
              echo "No new instances yet — waiting..."
              ALL_POLLS_READY=false
            elif [ "$ALL_NEW_READY" = "true" ]; then
              echo "All new instances are READY — healthy"
              HEALTHY="true"
              break
            else
              echo "New instances found but not all READY — waiting..."
              ALL_POLLS_READY=false
            fi
          fi

          if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
            echo "Retrying in ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          fi
        done

        if [ "$HEALTHY" = "false" ] && [ "$ALL_POLLS_READY" = "true" ]; then
          echo "All instances consistently READY throughout — treating as healthy"
          HEALTHY="true"
        fi

        echo "healthy=$HEALTHY" >> "$GITHUB_OUTPUT"
        echo "Health check result: healthy=$HEALTHY"
