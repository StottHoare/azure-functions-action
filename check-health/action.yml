name: Check Azure Functions Health
description: Queries instance state via az webapp list-instances and reports whether the function is healthy.

inputs:
  app-name:
    description: Full Azure Function App name
    required: true
  resource-group:
    description: Azure resource group name
    required: true

outputs:
  healthy:
    description: true if the function app is healthy, false otherwise
    value: ${{ steps.health-check.outputs.healthy }}

runs:
  using: composite
  steps:
    - name: Check health via instance state
      id: health-check
      shell: bash
      run: |
        APP_NAME="${{ inputs.app-name }}"
        RG="${{ inputs.resource-group }}"

        echo "Waiting 30 seconds for function host restart..."
        sleep 30

        # Fast path: direct HTTP health check (no redirect follow — a 3xx means EasyAuth is enabled)
        HEALTH_URL="https://${APP_NAME}.azurewebsites.net/"
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 --max-redirs 0 "$HEALTH_URL" || echo "000")
        echo "HTTP health check status: $HTTP_STATUS"

        if [ "$HTTP_STATUS" = "200" ]; then
          echo "HTTP health check passed — healthy"
          echo "healthy=true" >> "$GITHUB_OUTPUT"
          exit 0
        elif [[ "$HTTP_STATUS" =~ ^3 ]]; then
          echo "HTTP health check redirected ($HTTP_STATUS) — authentication enabled, falling back to instance state polling"
        else
          echo "HTTP health check failed ($HTTP_STATUS) — falling back to instance state polling"
        fi

        HEALTHY="false"
        MAX_ATTEMPTS=10
        RETRY_INTERVAL=30
        SEEN_TRANSITIONAL=false
        ALL_POLLS_READY=true

        for attempt in $(seq 1 $MAX_ATTEMPTS); do
          echo "Health check attempt $attempt of $MAX_ATTEMPTS..."

          STATES=$(az webapp list-instances \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --query "[].state" -o tsv 2>/dev/null || echo "")

          echo "Instance states: '$STATES'"

          if [ -z "$STATES" ]; then
            echo "No instances found yet."
            ALL_POLLS_READY=false
          else
            TRANSITIONAL=$(echo "$STATES" | grep -vE '^(READY|STOPPED)$' || true)

            if [ -n "$TRANSITIONAL" ]; then
              echo "Instances still transitioning: $TRANSITIONAL"
              SEEN_TRANSITIONAL=true
              ALL_POLLS_READY=false
            elif echo "$STATES" | grep -q '^STOPPED$'; then
              echo "One or more instances are STOPPED — unhealthy"
              ALL_POLLS_READY=false
            else
              echo "All instances are READY"
              if [ "$SEEN_TRANSITIONAL" = "true" ]; then
                HEALTHY="true"
                break
              else
                echo "Restart cycle not yet observed — may be stale, retrying..."
              fi
            fi
          fi

          if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
            echo "Retrying in ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          fi
        done

        if [ "$HEALTHY" = "false" ] && [ "$ALL_POLLS_READY" = "true" ]; then
          echo "All instances consistently READY throughout — treating as healthy"
          HEALTHY="true"
        fi

        echo "healthy=$HEALTHY" >> "$GITHUB_OUTPUT"
        echo "Health check result: healthy=$HEALTHY"
